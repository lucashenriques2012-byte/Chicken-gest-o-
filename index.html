<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#F97316">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Chicken Point">
<title>Chicken Point · Gestão</title>
<link rel="apple-touch-icon" href="logo.PNG">
<link rel="icon" href="logo.PNG">
<style>
  :root{
    --lar:#F97316; --lar-esc:#EA580C; --lar-claro:#FFF3E8; --lar-borda:#FDD9B8;
    --tinta:#241611; --cinza:#8A7F79; --cinza-claro:#C9C1BC;
    --papel:#FAF7F5; --branco:#FFFFFF; --borda:#EEE7E2;
    --verm:#DC2626; --verm-fundo:#FEE8E8; --verde:#16A34A; --verde-fundo:#E9F9EE;
    --amar-fundo:#FEF6E0; --amar-texto:#A16207;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{font-size:16px}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--papel);color:var(--tinta);
    padding-bottom:calc(76px + env(safe-area-inset-bottom));
  }
  .wrap{max-width:480px;margin:0 auto;padding:0 16px}

  /* Cabeçalho */
  header{
    position:sticky;top:0;z-index:20;background:rgba(255,255,255,.94);
    backdrop-filter:blur(10px);border-bottom:1px solid var(--borda);
    padding:calc(12px + env(safe-area-inset-top)) 0 12px;
  }
  .marca{display:flex;align-items:center;gap:12px}
  .logo{width:42px;height:42px;border-radius:14px;background:var(--lar);
    display:flex;align-items:center;justify-content:center;font-size:22px;
    box-shadow:0 4px 10px rgba(249,115,22,.35);overflow:hidden}
  .marca h1{font-size:17px;font-weight:800;letter-spacing:-.3px;line-height:1.1}
  .marca small{font-size:12px;font-weight:700;color:var(--lar)}
  .sino{position:relative;margin-left:auto;background:var(--lar-claro);border:none;
    border-radius:999px;width:40px;height:40px;font-size:18px}
  .sino b{position:absolute;top:-4px;right:-4px;background:var(--verm);color:#fff;
    border-radius:999px;min-width:19px;height:19px;font-size:11px;font-weight:800;
    display:flex;align-items:center;justify-content:center;padding:0 4px}
  #sync{font-size:10px;color:var(--cinza);margin-left:auto;padding-right:2px}

  main{padding-top:18px}
  h2{font-size:19px;font-weight:800;letter-spacing:-.3px}
  .secao{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.09em;
    color:var(--cinza);margin:20px 0 8px;display:flex;align-items:center;gap:6px}
  .secao .cont{background:#F1EAE5;color:var(--cinza);border-radius:999px;
    padding:1px 8px;font-size:11px}
  .secao-btn{width:100%;background:var(--branco);border:1px solid var(--borda);
    border-radius:14px;padding:12px;cursor:pointer;font-family:inherit;
    font-size:12px;text-transform:none;letter-spacing:0;margin:14px 0 8px}
  .secao-btn .seta{font-size:11px;color:var(--cinza-claro);width:14px}
  .secao-btn .cat-nome{font-weight:800;font-size:13px;color:var(--tinta)}
  .secao-btn .tag{margin-left:auto}
  .topo{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}

  /* Cards e listas */
  .card{background:var(--branco);border:1px solid var(--borda);border-radius:18px;
    padding:14px;margin-bottom:8px}
  .card.alerta-verm{background:var(--verm-fundo);border-color:#F5C2C2;color:#991B1B}
  .card.alerta-lar{background:var(--lar-claro);border-color:var(--lar-borda);color:#9A3412}
  .card.alerta-amar{background:var(--amar-fundo);border-color:#F1DFA8;color:var(--amar-texto)}
  .card.ok{background:var(--verde-fundo);border-color:#BCE8CB;color:#166534;font-weight:600;font-size:14px}
  .alerta-txt{font-size:14px;font-weight:600;line-height:1.35}

  .linha{display:flex;align-items:center;gap:10px}
  .cresce{flex:1;min-width:0}
  .nome{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sub{font-size:12px;color:var(--cinza);margin-top:1px}
  .tag{font-size:11px;font-weight:800;padding:2px 8px;border-radius:999px;display:inline-block}
  .tag.verm{background:var(--verm-fundo);color:var(--verm)}
  .tag.lar{background:var(--lar-claro);color:var(--lar-esc)}
  .tag.amar{background:var(--amar-fundo);color:var(--amar-texto)}
  .tag.neutro{background:#F1EAE5;color:var(--cinza)}

  /* Resumo do mês */
  .grade2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .kpi{border-radius:18px;padding:14px;border:1px solid var(--borda);background:var(--branco)}
  .kpi.destaque{background:var(--lar);border-color:var(--lar);color:#fff;
    box-shadow:0 6px 14px rgba(249,115,22,.3)}
  .kpi p{font-size:12px;font-weight:600;opacity:.75}
  .kpi b{display:block;font-size:20px;font-weight:800;margin-top:3px;letter-spacing:-.4px}
  .kpi .verm{color:var(--verm)}
  .kpi .lar{color:var(--lar-esc)}

  /* Botões */
  .btn{border:none;border-radius:14px;font-weight:800;font-size:14px;cursor:pointer}
  .btn-cheio{width:100%;padding:14px;background:var(--lar);color:#fff}
  .btn-cheio:active{background:var(--lar-esc)}
  .btn-pill{background:var(--lar);color:#fff;border-radius:999px;padding:9px 16px;font-size:12px}
  .btn-mini{background:var(--lar);color:#fff;border-radius:999px;padding:7px 12px;
    font-size:12px;white-space:nowrap}
  .btn-fantasma{background:none;color:var(--cinza-claro);padding:6px;font-size:15px}
  .qtd-btn{width:32px;height:32px;border-radius:999px;border:1px solid var(--cinza-claro);
    background:var(--branco);font-size:17px;font-weight:700;color:var(--tinta)}
  .qtd-btn.mais{background:var(--lar);border-color:var(--lar);color:#fff}
  .qtd-num{min-width:38px;text-align:center;font-weight:800;font-size:15px}

  /* Formulários */
  .form{background:var(--lar-claro);border:1px solid var(--lar-borda);border-radius:18px;
    padding:16px;margin-bottom:14px}
  .form .titulo{font-size:11px;font-weight:800;text-transform:uppercase;
    letter-spacing:.09em;color:var(--lar-esc);margin-bottom:10px}
  label{display:block;margin-bottom:10px}
  label span{font-size:11px;font-weight:700;text-transform:uppercase;
    letter-spacing:.06em;color:var(--cinza)}
  input,select{width:100%;margin-top:4px;padding:11px 12px;border-radius:12px;
    border:1px solid var(--borda);background:var(--branco);font-size:15px;
    font-family:inherit;color:var(--tinta);appearance:none;-webkit-appearance:none}
  input:focus,select:focus{outline:none;border-color:var(--lar)}
  .chk{display:flex;align-items:flex-start;gap:10px;background:var(--branco);
    border:1px solid var(--borda);border-radius:12px;padding:12px;margin-bottom:10px}
  .chk input{width:20px;height:20px;margin-top:2px;accent-color:var(--lar)}
  .chk b{font-size:14px}
  .chk small{display:block;font-size:12px;color:var(--cinza);margin-top:2px}

  /* Sub-abas relatórios */
  .subabas{display:flex;gap:8px;margin-bottom:14px}
  .subabas button{flex:1;border:1px solid var(--borda);background:var(--branco);
    color:var(--cinza);border-radius:999px;padding:9px 4px;font-size:12px;font-weight:800}
  .subabas button.ativo{background:var(--lar);border-color:var(--lar);color:#fff}

  /* Gráfico */
  .grafico{display:flex;align-items:flex-end;gap:8px;height:130px;padding-top:8px}
  .grafico .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end}
  .grafico .barra{width:100%;background:var(--lar);border-radius:8px 8px 3px 3px;min-height:8px}
  .grafico small{font-size:10px;color:var(--cinza)}

  /* Vazio */
  .vazio{text-align:center;padding:44px 20px;color:var(--cinza)}
  .vazio .icone{font-size:34px;background:var(--lar-claro);width:72px;height:72px;
    border-radius:999px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
  .vazio b{display:block;color:var(--tinta);font-size:14px;margin-bottom:4px}
  .vazio p{font-size:12px;max-width:250px;margin:0 auto;line-height:1.4}

  /* Navegação inferior */
  nav{position:fixed;left:0;right:0;bottom:0;z-index:20;background:var(--branco);
    border-top:1px solid var(--borda);padding-bottom:env(safe-area-inset-bottom)}
  .nav-in{max-width:480px;margin:0 auto;display:flex}
  nav button{flex:1;background:none;border:none;padding:9px 0 7px;display:flex;
    flex-direction:column;align-items:center;gap:2px;font-family:inherit}
  nav .ico{font-size:20px;filter:grayscale(1) opacity(.42);position:relative}
  nav button.ativo .ico{filter:none}
  nav .rotulo{font-size:10px;font-weight:800;color:var(--cinza-claro)}
  nav button.ativo .rotulo{color:var(--lar)}
  nav .badge{position:absolute;top:-5px;right:-11px;background:var(--verm);color:#fff;
    border-radius:999px;min-width:17px;height:17px;font-size:10px;font-weight:800;
    display:flex;align-items:center;justify-content:center;padding:0 4px;filter:none}

  /* Toast */
  #toast{position:fixed;left:50%;bottom:calc(90px + env(safe-area-inset-bottom));
    transform:translateX(-50%) translateY(20px);background:var(--tinta);color:#fff;
    padding:11px 18px;border-radius:999px;font-size:13px;font-weight:600;opacity:0;
    transition:.25s;pointer-events:none;z-index:50;white-space:nowrap;max-width:92vw;
    overflow:hidden;text-overflow:ellipsis}
  #toast.mostra{opacity:1;transform:translateX(-50%) translateY(0)}

  .carregando{text-align:center;padding:60px 0;color:var(--cinza);font-weight:600;font-size:14px}
  .riscado{text-decoration:line-through;color:var(--cinza-claro)}
  .check{width:26px;height:26px;border-radius:999px;border:2px solid var(--cinza-claro);
    background:none;font-size:14px;color:#fff;flex-shrink:0}
  .check.feito{background:var(--verde);border-color:var(--verde)}
  .add-linha{display:flex;gap:8px;margin-bottom:10px}
  .add-linha input{margin-top:0;flex:1}
  .add-linha .btn-pill{border-radius:12px;font-size:18px;padding:0 16px}
  .total-card{background:var(--tinta);color:#fff;border:none}
  .total-card p{font-size:12px;color:#B8ADA7;font-weight:600}
  .total-card b{display:block;font-size:24px;font-weight:800;color:#FFB264;margin-top:2px}
  .total-card small{font-size:12px;color:#B8ADA7}
  .analise{background:var(--lar-claro);border:1px solid var(--lar-borda);border-radius:18px;
    padding:16px;font-size:14px;line-height:1.5}
  .pago-lista .card{opacity:.65;background:#F5F0EC}

  /* Login e perfis */
  .btn-sair{margin-left:8px;background:none;border:1px solid var(--borda);border-radius:999px;
    padding:8px 12px;font-size:11px;font-weight:800;color:var(--cinza);font-family:inherit;cursor:pointer}
  .login{max-width:300px;margin:48px auto 0;text-align:center}
  .login .logo{width:88px;height:88px;margin:0 auto 16px;font-size:42px;border-radius:24px}
  .login h2{margin-bottom:4px}
  .login p{font-size:13px;color:var(--cinza);margin-bottom:18px}
  .login input{text-align:center;font-size:20px;letter-spacing:.3em;font-weight:800}
  .login .btn-cheio{margin-top:6px}
  .qtd-input{width:70px;margin-top:0;text-align:center;font-weight:800;padding:8px 4px;font-size:15px}
</style>
</head>
<body>

<header>
  <div class="wrap marca">
    <div class="logo"><img src="logo.PNG" alt="Chicken Point" style="width:100%;height:100%;object-fit:cover" onerror="this.parentNode.textContent='🍗'"></div>
    <div>
      <h1>Chicken Point</h1>
      <small>Gestão</small>
    </div>
    <span id="sync"></span>
    <button class="sino" id="sino" onclick="irPara('inicio')" style="display:none">🔔<b id="sino-n"></b></button>
    <button class="btn-sair" id="btn-sair" onclick="sair()" style="display:none">Sair</button>
  </div>
</header>

<main><div class="wrap" id="main"><div class="carregando">🍗 Carregando seus dados...</div></div></main>

<nav><div class="nav-in" id="nav"></div></nav>
<div id="toast"></div>

<script>
/* ============ CONFIGURAÇÃO DO BANCO (Supabase) ============ */
const SB_URL = "https://goueultbbufbzvcbfftr.supabase.co/rest/v1/dados";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdvdWV1bHRiYnVmYnp2Y2JmZnRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2OTgzMDMsImV4cCI6MjA5OTI3NDMwM30.BT_tw5xLAE_vEZCVU37qwkKFneQdFOcKgU-4oMJb2P0";
const CAB = { apikey: SB_KEY, Authorization: "Bearer " + SB_KEY };

/* ============ ACESSO (troque as senhas abaixo antes de publicar!) ============ */
const SENHA_ADMIN = "2502";        // ← SUA senha (acesso total)
const SENHA_FUNCIONARIO = "1234";  // ← senha da FUNCIONÁRIA (só contagem de estoque)

let perfil = null;
try { perfil = localStorage.getItem("cp_perfil"); } catch (e) {}
if (perfil !== "admin" && perfil !== "func") perfil = null;

function entrar() {
  const s = document.getElementById("senha").value.trim();
  if (s === SENHA_ADMIN) perfil = "admin";
  else if (s === SENHA_FUNCIONARIO) perfil = "func";
  else { toast("Senha incorreta"); return; }
  try { localStorage.setItem("cp_perfil", perfil); } catch (e) {}
  tab = perfil === "func" ? "estoque" : "inicio";
  render();
}
function sair() {
  perfil = null;
  try { localStorage.removeItem("cp_perfil"); } catch (e) {}
  render();
}

/* ============ ESTADO ============ */
let S = { estoque: [], compras: [], boletos: [], vendas: [], insta: [] };
let tab = "inicio", subTab = "vendas";
let formEstoque = false, formBoleto = false, editId = null;
let pronto = false, salvandoTimer = null;

const CATS = ["Frango", "Porções", "Molhos", "Bebidas", "Mercado", "Embalagens", "Outros"];
const CAT_EMOJI = { Frango:"🍗", "Porções":"🍟", Molhos:"🥫", Bebidas:"🥤", Mercado:"🛒", Embalagens:"📦", Outros:"📋" };
const MAPA_NUM = { "1":"Frango", "2":"Porções", "4":"Molhos", "5":"Embalagens" };
const CAT_RENOMEADAS = { "Porção":"Porções", "Lanche":"Outros" };

/* Categorias minimizadas (lembradas neste aparelho) */
let catFechadas = {};
try { catFechadas = JSON.parse(localStorage.getItem("cp_cats") || "{}"); } catch (e) {}
function toggleCat(chave) {
  catFechadas[chave] = !catFechadas[chave];
  try { localStorage.setItem("cp_cats", JSON.stringify(catFechadas)); } catch (e) {}
  render();
}

/* ============ HELPERS ============ */
const uid = () => Math.random().toString(36).slice(2, 10);
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
const fmtR = (v) => (Number(v) || 0).toLocaleString("pt-BR", { style:"currency", currency:"BRL" });

function hojeStr() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}
function diasAte(s) {
  if (!s) return 999;
  const [y,m,d] = s.split("-").map(Number);
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  return Math.round((new Date(y, m-1, d) - hoje) / 86400000);
}
function fmtData(s) {
  if (!s) return "-";
  const [y,m,d] = s.split("-");
  return d + "/" + m + "/" + y.slice(2);
}
const mesAtual = (s) => s && s.slice(0,7) === hojeStr().slice(0,7);
function proximoMes(s) {
  const [y,m,d] = s.split("-").map(Number);
  const nm = m === 12 ? 1 : m + 1, ny = m === 12 ? y + 1 : y;
  const ult = new Date(ny, nm, 0).getDate();
  return ny + "-" + String(nm).padStart(2,"0") + "-" + String(Math.min(d, ult)).padStart(2,"0");
}
function migrar(d) {
  return { ...d, estoque: (d.estoque || []).map(it => {
    const cat = CAT_RENOMEADAS[it.categoria] || it.categoria;
    const m = String(it.nome || "").match(/^\s*([1-5])\s*[-–.):]?\s*(.+)$/);
    if (m && MAPA_NUM[m[1]]) return { ...it, categoria: MAPA_NUM[m[1]], nome: m[2].trim() };
    if (m) return { ...it, categoria: CATS.includes(cat) ? cat : "Outros", nome: m[2].trim() };
    if (!CATS.includes(cat)) return { ...it, categoria: "Outros" };
    return { ...it, categoria: cat };
  })};
}

/* ============ BANCO ============ */
async function carregar(silencioso) {
  try {
    const r = await fetch(SB_URL + "?id=eq.1&select=conteudo", { headers: CAB });
    if (!r.ok) throw new Error(r.status);
    const j = await r.json();
    S = migrar(Object.assign({ estoque:[], compras:[], boletos:[], vendas:[], insta:[] }, (j[0] && j[0].conteudo) || {}));
    pronto = true;
    render();
    marca("✓ sincronizado");
  } catch (e) {
    if (!silencioso) toast("Sem conexão com o banco — verifique a internet");
    marca("");
  }
}
function mudou() {
  render();
  marca("salvando...");
  clearTimeout(salvandoTimer);
  salvandoTimer = setTimeout(salvar, 700);
}
async function salvar() {
  salvandoTimer = null;
  try {
    const r = await fetch(SB_URL + "?id=eq.1", {
      method: "PATCH",
      headers: { ...CAB, "Content-Type": "application/json", Prefer: "return=minimal" },
      body: JSON.stringify({ conteudo: S }),
    });
    if (!r.ok) throw new Error(r.status);
    marca("✓ salvo");
  } catch (e) {
    marca("");
    toast("⚠️ Falha ao salvar — verifique a internet");
  }
}
function marca(t) { document.getElementById("sync").textContent = t; }

// Sincroniza quando volta pro app / a cada 60s (pausa se algum campo estiver em uso — protege a contagem)
function emUso() {
  const el = document.activeElement;
  return formEstoque || formBoleto || (el && (el.tagName === "INPUT" || el.tagName === "SELECT" || el.tagName === "TEXTAREA"));
}
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible" && pronto && !emUso() && !salvandoTimer) carregar(true);
});
setInterval(() => {
  if (document.visibilityState === "visible" && pronto && !emUso() && !salvandoTimer) carregar(true);
}, 60000);

/* ============ ALERTAS ============ */
function calcAlertas() {
  const a = [];
  S.boletos.filter(b => !b.pago).forEach(b => {
    const d = diasAte(b.vencimento);
    if (d < 0) a.push({ cls:"verm", t:`💰 ${esc(b.descricao)} VENCEU há ${Math.abs(d)} dia(s) — ${fmtR(b.valor)}` });
    else if (d === 0) a.push({ cls:"verm", t:`💰 ${esc(b.descricao)} vence HOJE — ${fmtR(b.valor)}` });
    else if (d === 1) a.push({ cls:"lar", t:`💰 ${esc(b.descricao)} vence AMANHÃ — ${fmtR(b.valor)}` });
    else if (d <= 5) a.push({ cls:"amar", t:`💰 ${esc(b.descricao)} vence em ${d} dias — ${fmtR(b.valor)}` });
  });
  const zer = S.estoque.filter(i => Number(i.qtd) <= 0).length;
  const bax = S.estoque.filter(i => Number(i.qtd) > 0 && Number(i.qtd) <= Number(i.minimo)).length;
  const tot = zer + bax;
  if (tot > 0) a.push({ cls: zer > 0 ? "verm" : "lar",
    t:`🛒 ${tot} ${tot === 1 ? "item precisa" : "itens precisam"} de compra${zer > 0 ? ` (${zer} já zerou)` : ""} — veja a aba Compras` });
  return a;
}
const itensComprar = () => S.estoque.filter(i => Number(i.qtd) <= Number(i.minimo)).length;

/* ============ AÇÕES: ESTOQUE ============ */
function abrirNovoItem() { editId = null; formEstoque = !formEstoque; render(); }
function editarItem(id) {
  editId = id; formEstoque = true; render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}
function salvarItem() {
  const nome = document.getElementById("f-nome").value.trim();
  if (!nome) { toast("Dá um nome pro item"); return; }
  const item = {
    nome,
    categoria: document.getElementById("f-cat").value,
    qtd: Number(document.getElementById("f-qtd").value) || 0,
    unidade: document.getElementById("f-un").value.trim() || "un",
    minimo: Number(document.getElementById("f-min").value) || 0,
    custo: Number(document.getElementById("f-custo").value) || 0,
  };
  if (editId) S.estoque = S.estoque.map(i => i.id === editId ? { ...i, ...item } : i);
  else S.estoque.push({ id: uid(), ...item });
  editId = null; formEstoque = false;
  mudou();
}
function qtd(id, delta) {
  S.estoque = S.estoque.map(i => i.id === id ? { ...i, qtd: Math.max(0, Number(i.qtd) + delta) } : i);
  mudou();
}
function setQtd(id, valor) {
  const v = Math.max(0, Number(valor) || 0);
  S.estoque = S.estoque.map(i => i.id === id ? { ...i, qtd: v } : i);
  mudou();
}
function removerItem(id) {
  if (!confirm("Remover este item do estoque?")) return;
  S.estoque = S.estoque.filter(i => i.id !== id);
  mudou();
}

/* ============ AÇÕES: COMPRAS ============ */
function addCompra() {
  const el = document.getElementById("nova-compra");
  const v = el.value.trim();
  if (!v) return;
  S.compras.push({ id: uid(), nome: v, done: false });
  mudou();
}
function toggleCompra(id) {
  S.compras = S.compras.map(c => c.id === id ? { ...c, done: !c.done } : c);
  mudou();
}
function removerCompra(id) { S.compras = S.compras.filter(c => c.id !== id); mudou(); }
function comprei(id) {
  S.estoque = S.estoque.map(i => {
    if (i.id !== id) return i;
    const sug = Math.max(1, Number(i.minimo) * 2 - Number(i.qtd));
    return { ...i, qtd: Number(i.qtd) + sug };
  });
  toast("Entrada no estoque feita ✓");
  mudou();
}

/* ============ AÇÕES: FINANCEIRO ============ */
function abrirNovoBoleto() { formBoleto = !formBoleto; render(); }
function salvarBoleto() {
  const desc = document.getElementById("b-desc").value.trim();
  const valor = Number(document.getElementById("b-valor").value);
  if (!desc || !valor) { toast("Preenche descrição e valor"); return; }
  S.boletos.push({
    id: uid(), descricao: desc,
    fornecedor: document.getElementById("b-forn").value.trim(),
    valor,
    vencimento: document.getElementById("b-venc").value || hojeStr(),
    recorrente: document.getElementById("b-rec").checked,
    pago: false,
  });
  formBoleto = false;
  mudou();
}
function pagar(id) {
  const alvo = S.boletos.find(b => b.id === id);
  if (!alvo) return;
  S.boletos = S.boletos.map(b => b.id === id ? { ...b, pago: !b.pago } : b);
  if (!alvo.pago && alvo.recorrente) {
    const prox = proximoMes(alvo.vencimento);
    if (!S.boletos.some(b => b.descricao === alvo.descricao && b.vencimento === prox)) {
      S.boletos.push({ ...alvo, id: uid(), vencimento: prox, pago: false });
      toast("Boleto do mês seguinte criado 🔁");
    }
  }
  mudou();
}
function removerBoleto(id) {
  if (!confirm("Remover esta conta?")) return;
  S.boletos = S.boletos.filter(b => b.id !== id);
  mudou();
}

function irPara(t) { tab = t; formEstoque = false; formBoleto = false; editId = null; render(); window.scrollTo(0, 0); }

      <label><span>Data</span><input id="v-data" type="date" value="${hojeStr()}"></label>
      <div class="grade2">
        ${CANAIS.map(c => `<label><span>${c.emoji} ${c.nome} (R$)</span><input id="v-${c.id}" type="number" inputmode="decimal" placeholder="0,00"></label>`).join("")}
      </div>
      <label><span>Nº total de pedidos</span><input id="v-ped" type="number" inputmode="numeric" placeholder="0"></label>
      <p style="font-size:11px;color:var(--cinza);margin-bottom:10px">Canal sem venda no dia? Deixa vazio. Os valores estão no resumo diário do Cardápio Web e dos apps.</p>
      <button class="btn btn-cheio" onclick="salvarVenda()">Salvar dia</button>
    </div>`;
    [...ordenadas].reverse().forEach(v => {
      const divisao = v.canais
        ? CANAIS.filter(c => Number(v.canais[c.id]) > 0).map(c => `${c.emoji} ${fmtR(v.canais[c.id])}`).join(" · ")
        : "";
      html += `<div class="card">
        <div class="linha">
          <div class="sub" style="min-width:56px">${fmtData(v.data)}</div>
          <div class="cresce nome">${fmtR(v.faturamento)}</div>
          ${v.origem === "auto" ? '<span class="tag lar">🤖</span>' : ""}
          <div class="sub">${esc(v.pedidos)} ped.</div>
          <button class="btn btn-fantasma" onclick="removerVenda('${v.id}')">🗑</button>
        </div>
        ${divisao ? `<div class="sub" style="margin-top:4px">${divisao}</div>` : ""}
      </div>`;
    });
  }

  if (subTab === "insta") {
    html += `
    <div class="form">
      <div class="titulo">📱 Registrar post</div>
      <p style="font-size:12px;color:var(--cinza);margin-bottom:10px">Copie os números do Instagram Insights e cole aqui.</p>
      <label><span>Descrição do post</span><input id="i-desc" placeholder="Ex: Vídeo balde de frango + promoção"></label>
      <label><span>Data</span><input id="i-data" type="date" value="${hojeStr()}"></label>
      <div class="grade2" style="grid-template-columns:1fr 1fr 1fr">
        <label><span>Alcance</span><input id="i-alc" type="number" inputmode="numeric" placeholder="0"></label>
        <label><span>Curtidas</span><input id="i-cur" type="number" inputmode="numeric" placeholder="0"></label>
        <label><span>Coment.</span><input id="i-com" type="number" inputmode="numeric" placeholder="0"></label>
      </div>
      <button class="btn btn-cheio" onclick="salvarPost()">Salvar post</button>
    </div>`;
    if (!S.insta.length)
      html += `<div class="vazio"><div class="icone">📱</div><b>Nenhum post registrado</b><p>Registre seus posts pra ver o que dá mais resultado.</p></div>`;
    [...S.insta].sort((a,b) => b.data.localeCompare(a.data)).forEach(p => {
      const eng = p.alcance > 0 ? (((Number(p.curtidas) + Number(p.comentarios)) / p.alcance) * 100).toFixed(1) : "0";
      html += `
      <div class="card">
        <div class="linha">
          <div class="cresce"><div class="nome">${esc(p.descricao)}</div><div class="sub">${fmtData(p.data)}</div></div>
          <button class="btn btn-fantasma" onclick="removerPost('${p.id}')">🗑</button>
        </div>
        <div class="linha" style="margin-top:8px;font-size:12px;color:var(--cinza)">
          <span>👁 <b>${esc(p.alcance)}</b></span><span>❤️ <b>${esc(p.curtidas)}</b></span>
          <span>💬 <b>${esc(p.comentarios)}</b></span>
          <span class="tag lar" style="margin-left:auto">${eng}% eng.</span>
        </div>
      </div>`;
    });
  }

  if (subTab === "ia") {
    html += `
    <div class="analise">
      <b style="font-size:15px">🤖 Análise do negócio com o Claude</b>
      <p style="margin-top:6px;color:#7C4A28">Toca no botão abaixo pra copiar todos os seus dados (estoque, contas, vendas, Instagram) já formatados. Depois é só colar numa conversa no Claude que ele te devolve a análise completa com ações práticas.</p>
      <button class="btn btn-cheio" style="margin-top:12px" onclick="copiarResumo()">📋 Copiar resumo pra análise</button>
    </div>`;
  }
  return html;
}

function vLogin() {
  return `
  <div class="login">
    <div class="logo"><img src="logo.PNG" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:24px" onerror="this.parentNode.textContent='🍗'"></div>
    <h2>Chicken Point · Gestão</h2>
    <p>Digite sua senha de acesso</p>
    <label><input id="senha" type="password" inputmode="numeric" placeholder="••••" onkeydown="if(event.key==='Enter')entrar()"></label>
    <button class="btn btn-cheio" onclick="entrar()">Entrar</button>
  </div>`;
}

/* ============ RENDER ============ */
const ABAS = [
  { id:"inicio", ico:"🏠", rot:"Início" },
  { id:"estoque", ico:"📦", rot:"Estoque" },
  { id:"compras", ico:"🛒", rot:"Compras" },
  { id:"contas", ico:"💰", rot:"Contas" },
  { id:"relatorios", ico:"📊", rot:"Relatórios" },
];
function render() {
  if (!pronto) return;
  const sino = document.getElementById("sino");
  const btnSair = document.getElementById("btn-sair");

  // Sem login: mostra só a tela de senha
  if (!perfil) {
    document.getElementById("main").innerHTML = vLogin();
    document.getElementById("nav").innerHTML = "";
    sino.style.display = "none";
    btnSair.style.display = "none";
    return;
  }

  // Funcionário: acesso restrito à aba Estoque
  const abasVisiveis = perfil === "func" ? ABAS.filter(a => a.id === "estoque") : ABAS;
  if (perfil === "func") tab = "estoque";

  const views = { inicio:vInicio, estoque:vEstoque, compras:vCompras, contas:vContas, relatorios:vRelatorios };
  document.getElementById("main").innerHTML = views[tab]();
  const n = itensComprar();
  document.getElementById("nav").innerHTML = abasVisiveis.map(a => `
    <button class="${tab === a.id ? "ativo" : ""}" onclick="irPara('${a.id}')">
      <span class="ico">${a.ico}${a.id === "compras" && n > 0 ? `<span class="badge">${n}</span>` : ""}</span>
      <span class="rotulo">${a.rot}</span>
    </button>`).join("");
  const alertas = calcAlertas().length;
  sino.style.display = perfil === "admin" && alertas > 0 ? "" : "none";
  document.getElementById("sino-n").textContent = alertas;
  btnSair.style.display = "";
}

carregar();
</script>
</body>
</html>
